description: >-
  FinOps view of Simple Analytics spend. Simple Analytics bills a flat monthly
  or annual subscription scaled by the number of data points (page views plus
  events) collected per month and the number of tracked websites, with extra
  per-user charges on higher plans. There is no per-API-call metered billing;
  cost is driven by the monthly data point volume and the chosen plan tier.
notes: >-
  Plan prices and data point tiers change; verify against the live pricing page
  during reconciliation.
sources:
- https://www.simpleanalytics.com/pricing
- https://docs.simpleanalytics.com/api
