meters:
- name: datapoints
  description: Page views plus events collected per month, counted against the plan allowance.
  unit: datapoints
  aggregation: sum
  dimensions:
  - account
  - website
- name: websites
  description: Number of tracked websites against the plan allowance.
  unit: websites
  aggregation: max
  dimensions:
  - account
- name: additional_users
  description: Extra users beyond the included seat, billed per user per month.
  unit: users
  aggregation: max
  dimensions:
  - account
principles:
- name: Visibility
  description: Track monthly data point consumption per website against the plan allowance.
- name: Allocation
  description: Map each tracked website and API key to its owning team or cost center.
- name: Optimization
  description: Right-size the plan tier to actual data point volume; consolidate websites where possible.
- name: Accountability
  description: Review the subscription tier and additional-user seats against budget each billing cycle.
